services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tickerlens}
      POSTGRES_USER: ${POSTGRES_USER:-tickerlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tickerlens}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tickerlens} -d ${POSTGRES_DB:-tickerlens}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio_init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb -p local/$$MINIO_BUCKET_RAW_DOCS || true;
      mc anonymous set none local/$$MINIO_BUCKET_RAW_DOCS || true;
      echo 'MinIO buckets ensured.';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_RAW_DOCS: ${MINIO_BUCKET_RAW_DOCS:-raw-docs}
    restart: "no"

  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-ChangeMe_123456789!}
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  opensearch_dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    depends_on:
      - opensearch
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"

  migrate:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    environment:
      TICKERLENS_ENVIRONMENT: dev
      TICKERLENS_DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-tickerlens}:${POSTGRES_PASSWORD:-tickerlens}@postgres:5432/${POSTGRES_DB:-tickerlens}"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    environment:
      TICKERLENS_ENVIRONMENT: dev
      TICKERLENS_DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-tickerlens}:${POSTGRES_PASSWORD:-tickerlens}@postgres:5432/${POSTGRES_DB:-tickerlens}"
      TICKERLENS_S3_ENDPOINT_URL: "http://minio:9000"
      TICKERLENS_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      TICKERLENS_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      TICKERLENS_S3_RAW_DOCS_BUCKET: ${MINIO_BUCKET_RAW_DOCS:-raw-docs}
      TICKERLENS_S3_PUBLIC_ENDPOINT_URL: ${TICKERLENS_S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      TICKERLENS_OPENAI_RERANK_MODEL: ${TICKERLENS_OPENAI_RERANK_MODEL:-gpt-4o-mini}
      TICKERLENS_OPENAI_RERANK_MAX_PASSAGE_CHARS: ${TICKERLENS_OPENAI_RERANK_MAX_PASSAGE_CHARS:-1200}
      TICKERLENS_RERANK_BACKEND: ${TICKERLENS_RERANK_BACKEND:-fastembed}
      TICKERLENS_FASTEMBED_RERANK_MODEL: ${TICKERLENS_FASTEMBED_RERANK_MODEL:-Xenova/ms-marco-MiniLM-L-6-v2}
      TICKERLENS_FASTEMBED_RERANK_BATCH_SIZE: ${TICKERLENS_FASTEMBED_RERANK_BATCH_SIZE:-32}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      opensearch:
        condition: service_started
    volumes:
      - fastembed_cache:/tmp/fastembed_cache

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  opensearch_data:
  fastembed_cache:
